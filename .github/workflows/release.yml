name: Release

# Triggered by pushing a tag that matches `v*` (e.g. `v0.2.0`, `v0.2.0-beta`,
# `v0.2.0-rc1`). Builds the macOS .app + DMG and the Linux AppImage, then
# attaches them to a new GitHub Release.
#
# Prerelease vs. final is auto-detected from the tag: names containing
# `-beta`, `-rc`, or `-alpha` mark the release as a prerelease. A bare
# `v0.2.0` ships as a stable release.
#
# Manual triggers are supported via `workflow_dispatch` for testing the
# pipeline on an already-pushed tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to rebuild
        required: true
        type: string

env:
  # Silence the Node 20 deprecation warning until first-party actions
  # (@v4 / @v5) land their Node 24 bump. Opt-in keyed per GitHub's changelog.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write  # needed to create/update the release.

jobs:
  macos:
    name: macOS · universal .app + .dmg
    runs-on: macos-latest
    # Signing + notarization are gated on `APPLE_API_KEY_ID` — without it
    # every signing step skips and the workflow produces a (Gatekeeper-
    # warning) unsigned DMG, so older tags can still be rebuilt without
    # backporting the cert setup.
    #
    # Notarization uses an App Store Connect API key (.p8) rather than the
    # legacy Apple-ID + app-specific-password path — recommended by Apple
    # for CI, not tied to a specific Apple ID, scopable per key. Codesigning
    # still needs the Developer ID Application certificate (a .p12 with the
    # private key).
    env:
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
      APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
      APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      # Import the Developer ID Application cert into a fresh ephemeral
      # keychain. Using a dedicated keychain (rather than the default login
      # one) so the cleanup step below wipes it wholesale without touching
      # any runner-shared state — GitHub's macos-latest runners reset
      # between jobs, but being explicit never hurts.
      - name: Import Developer ID cert
        if: env.APPLE_API_KEY_ID != ''
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "KEYCHAIN=$KEYCHAIN"                 >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          CERT_P12="$RUNNER_TEMP/developer_id.p12"
          echo "$APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64" | base64 --decode > "$CERT_P12"
          security import "$CERT_P12" \
            -k "$KEYCHAIN" \
            -P "$APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD" \
            -T /usr/bin/codesign
          rm -f "$CERT_P12"

          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Put our keychain first so `codesign --sign "Developer ID
          # Application: …"` finds the imported identity before any system
          # one, and find the full-name so downstream steps can quote it
          # even when the CN contains shell-sensitive characters.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          SIGN_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$SIGN_IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in keychain after import."
            exit 1
          fi
          echo "SIGN_IDENTITY=$SIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "Using signing identity: $SIGN_IDENTITY"

      - name: Build universal .app (arm64 + x86_64)
        run: wails build -platform darwin/universal -tags xsd -clean

      # Sign the .app with the hardened runtime + our entitlements, then
      # verify the signature parses cleanly. `--deep` walks every binary
      # inside the bundle (Wails ships a few helper libs); `--options
      # runtime` is the magic flag notarization requires.
      - name: Codesign .app
        if: env.APPLE_API_KEY_ID != ''
        run: |
          set -euo pipefail
          APP="build/bin/fbe-go.app"
          codesign --force --deep --timestamp \
            --options runtime \
            --entitlements packaging/macos/entitlements.plist \
            --sign "$SIGN_IDENTITY" \
            "$APP"
          codesign --verify --verbose=2 --deep --strict "$APP"
          # Spctl assessment is informational here — the app hasn't been
          # notarized yet, so Gatekeeper will still reject "source=No
          # usable signature". We just want to confirm the CODESIGN bits
          # are correct before paying for a notary round-trip.
          spctl --assess --type execute --verbose "$APP" || true

      # Notarize the .app via a zipped submission (the notary service
      # rejects .app bundles directly; a .zip or .dmg works). We upload
      # the zip, wait for verdict, staple the ticket back onto the live
      # .app on disk. If this step fails, nothing downstream ships — the
      # tag is a bad release and will be retried.
      #
      # Credentials use the App Store Connect API key path: `--key` points
      # at a .p8 file we decode from the base64 secret, `--key-id` names
      # the Key ID (10-char), `--issuer` is the team-level UUID.
      # notarytool stores no state on disk beyond the request, so we just
      # keep the .p8 around for both submissions and shred it in the
      # cleanup step.
      - name: Notarize .app
        if: env.APPLE_API_KEY_ID != ''
        run: |
          set -euo pipefail
          APP="build/bin/fbe-go.app"
          ZIP="$RUNNER_TEMP/fbe-go.app.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"

          API_KEY="$RUNNER_TEMP/asc_api_key.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY"
          chmod 600 "$API_KEY"
          echo "API_KEY=$API_KEY" >> "$GITHUB_ENV"

          xcrun notarytool submit "$ZIP" \
            --key       "$API_KEY" \
            --key-id    "$APPLE_API_KEY_ID" \
            --issuer    "$APPLE_API_ISSUER_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package DMG
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mkdir -p dist
          # create-dmg lays out a nice drag-to-/Applications window with
          # the app icon and an Applications alias, spinning out a 1-screen
          # background image (we skip that; the default blank is fine).
          create-dmg \
            --volname "FictionBook Editor (Go)" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "fbe-go.app" 175 200 \
            --app-drop-link 425 200 \
            "dist/fbe-go-${TAG}-macos-universal.dmg" \
            "build/bin/fbe-go.app" \
          || {
            # `create-dmg` exits non-zero when signing fails but the .dmg
            # is still produced. The file existing is the real signal.
            ls -la "dist/fbe-go-${TAG}-macos-universal.dmg"
          }

      # Sign + notarize + staple the DMG too. Signing the DMG makes the
      # downloaded disk image trustable before mounting; notarizing it
      # lets Gatekeeper clear it on the first double-click without a
      # round-trip to Apple. Stapling attaches the notary ticket so this
      # works offline on the user's machine.
      - name: Codesign + notarize DMG
        if: env.APPLE_API_KEY_ID != ''
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          DMG="dist/fbe-go-${TAG}-macos-universal.dmg"

          codesign --force --timestamp \
            --sign "$SIGN_IDENTITY" \
            "$DMG"
          codesign --verify --verbose=2 "$DMG"

          xcrun notarytool submit "$DMG" \
            --key       "$API_KEY" \
            --key-id    "$APPLE_API_KEY_ID" \
            --issuer    "$APPLE_API_ISSUER_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

          # Final Gatekeeper dry-run: at this point spctl should say
          # "source=Notarized Developer ID".
          spctl --assess --type open --context context:primary-signature --verbose "$DMG"

      # Always clean up the ephemeral keychain + shred the API key, so
      # repeated workflow runs on the same runner (self-hosted edge case)
      # don't pile up identities or leave the .p8 on disk. `if: always()`
      # lets cleanup run even if notarization failed.
      - name: Remove ephemeral keychain + API key
        if: always() && env.APPLE_API_KEY_ID != ''
        run: |
          security delete-keychain "$KEYCHAIN" || true
          if [ -n "${API_KEY:-}" ] && [ -f "$API_KEY" ]; then
            rm -f "$API_KEY"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

  linux:
    name: Linux · x86_64 binary + .AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            fuse \
            libfuse2 \
            desktop-file-utils

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build Linux binary
        run: wails build -platform linux/amd64 -tags 'xsd webkit2_41' -clean

      - name: Download linuxdeploy
        run: |
          curl -fsSL -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy

      - name: Package AppImage
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mkdir -p dist
          # linuxdeploy builds an AppDir from our binary + .desktop + icon,
          # copies transitive shared libs it can detect, then hands to
          # appimagetool to produce the self-contained AppImage.
          # - wails.json sets `outputfilename: fbe`, so the Linux binary is
          #   `build/bin/fbe` (not `fbe-go`).
          # - build/appicon-linux.png is a 512×512 rescale of the 1024-px
          #   source; linuxdeploy rejects anything outside its canonical
          #   size set.
          # - OUTPUT env var controls the final .AppImage filename (the
          #   AppImage output plugin honors it). Without it the name is
          #   derived from the desktop `Name=` field, which gives a
          #   whitespace-y ugly string like FictionBook_Editor_(Go)-*.AppImage.
          OUTPUT="fbe-go-${TAG}-linux-x86_64.AppImage"
          export OUTPUT
          ./linuxdeploy --appimage-extract-and-run \
            --appdir AppDir \
            --executable build/bin/fbe \
            --desktop-file packaging/fbe-go.desktop \
            --icon-file build/appicon-linux.png \
            --icon-filename fbe-go \
            --output appimage
          mv "$OUTPUT" dist/

      - name: Package freedesktop integration tarball
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # Ship thumbnailer + shared-MIME + .desktop + README separately so
          # users can drop them into ~/.local/share/... — the AppImage alone
          # gets Finder-like integration but not thumbnail previews or MIME
          # registration. See packaging/README.md for install flow.
          tar -C packaging -czf \
            "dist/fbe-go-${TAG}-linux-freedesktop.tar.gz" \
            README.md fbe-go.desktop fbe-go-mime.xml fbe-go.thumbnailer

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-freedesktop
          path: dist/*.tar.gz

  # Collect artifacts from both build jobs into a single GitHub Release.
  # Separate job so a failure on one platform doesn't block uploading the
  # other, and vice-versa.
  release:
    name: Publish GitHub Release
    needs: [macos, linux]
    if: always() && (needs.macos.result == 'success' || needs.linux.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lah dist/

      - name: Purge any pre-existing release for this tag
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # softprops/action-gh-release@v2 has a race that surfaces when
          # we force-re-push a tag after a prior run's Publish step failed
          # mid-way: the previous run leaves an empty *published* release
          # on the tag, and the fresh attempt then creates a second
          # *draft* with the uploads — the finalize call to flip the
          # draft to published trips over the zombie with
          # `Validation Failed: already_exists`. See
          # https://github.com/softprops/action-gh-release/issues/363 .
          #
          # Workaround: before the action runs, delete every release
          # (draft or published) attached to this tag. We just built the
          # artifacts — recreating is cheap and gives a clean slate.
          IDS=$(gh api "repos/$REPO/releases" \
                  --paginate --jq ".[] | select(.tag_name == \"$TAG\") | .id")
          if [ -z "$IDS" ]; then
            echo "No existing releases for $TAG — nothing to purge."
          else
            for ID in $IDS; do
              echo "Deleting release $ID for tag $TAG"
              gh api "repos/$REPO/releases/$ID" -X DELETE
            done
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          # Prerelease when the tag hints at pre-stable (beta / rc / alpha).
          prerelease: >-
            ${{ contains(github.event.inputs.tag || github.ref_name, '-beta')
             || contains(github.event.inputs.tag || github.ref_name, '-rc')
             || contains(github.event.inputs.tag || github.ref_name, '-alpha') }}
          generate_release_notes: true
